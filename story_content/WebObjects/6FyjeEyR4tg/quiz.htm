<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sertifikat Penghargaan</title>

    <!-- Menggunakan Tailwind CSS untuk tata letak yang cepat -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts untuk tipografi yang elegan -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Pustaka HTML2PDF jika Anda tetap ingin fitur cetak terintegrasi langsung di dalamnya -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Montserrat", sans-serif;
        background-color: transparent; /* Transparan agar menyatu dengan slide IFP */
        overflow: hidden;
      }

      /* KANVAS SERTIFIKAT UTAMA (mengikuti ukuran sertifikat.htm) */
      #printable-certificate {
        width: 900px;
        height: 600px;
        background: linear-gradient(135deg, #f8fbff 0%, #eef6fb 100%);
        position: relative;
        box-sizing: border-box;
        border: 4px solid #123b5d;
        box-shadow: 0 10px 30px rgba(18, 59, 93, 0.18);
        overflow: hidden;
        flex-shrink: 0;

        /* Menjaga kanvas 900x600 tetap utuh di Web Object Storyline 1015x564. */
        transform-origin: center center;
        transform: scale(min(calc(100vw / 900), calc(100vh / 600)));
      }

      @media print {
        #printable-certificate {
          transform: scale(1) !important;
          box-shadow: none !important;
        }
      }

      body.pdf-export #printable-certificate {
        transform: scale(1) !important;
        box-shadow: none !important;
      }

      /* Latar stabil untuk html2canvas: tanpa clip-path dan tanpa rotasi. */
      .ai-grid {
        position: absolute;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(25, 130, 154, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(25, 130, 154, 0.055) 1px, transparent 1px);
        background-size: 30px 30px;
      }

      .top-band,
      .bottom-band {
        position: absolute;
        left: 0;
        width: 100%;
        z-index: 1;
      }

      .top-band {
        top: 0;
        height: 22px;
        background: #123b5d;
        border-bottom: 6px solid #21a3b8;
      }

      .bottom-band {
        bottom: 0;
        height: 18px;
        background: #123b5d;
        border-top: 5px solid #d6a83f;
      }

      .side-panel {
        position: absolute;
        top: 22px;
        bottom: 18px;
        width: 26px;
        z-index: 1;
        background: #19829a;
      }

      .side-panel.left {
        left: 0;
      }
      .side-panel.right {
        right: 0;
      }

      .certificate-frame {
        position: absolute;
        inset: 38px;
        z-index: 2;
        border: 2px solid rgba(25, 130, 154, 0.42);
        box-shadow: inset 0 0 0 6px rgba(255, 255, 255, 0.78);
      }

      .ai-accent {
        position: absolute;
        z-index: 2;
        width: 120px;
        height: 54px;
        background: #e4f3f6;
        border: 2px solid #21a3b8;
      }

      .ai-accent.top-right {
        top: 48px;
        right: 48px;
        border-left: 10px solid #21a3b8;
      }

      .ai-accent.bottom-left {
        bottom: 44px;
        left: 48px;
        border-right: 10px solid #d6a83f;
      }

      .ai-node {
        position: absolute;
        z-index: 3;
        width: 12px;
        height: 12px;
        background: #d6a83f;
        border: 3px solid #ffffff;
        box-shadow: 0 0 0 2px #19829a;
      }

      .node-one {
        top: 114px;
        right: 86px;
      }
      .node-two {
        bottom: 110px;
        left: 88px;
      }

      .ethics-label {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 18px;
        border: 1px solid #9ccfd8;
        background: #e6f5f7;
        color: #0e5c70;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* --- KONTEN TEKS SERTIFIKAT --- */
      .content-layer {
        position: relative;
        z-index: 10;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 82px 70px 38px;
        box-sizing: border-box;
      }

      .title {
        color: #19829a;
        font-size: 54px;
        font-weight: 800;
        letter-spacing: 2px;
        margin: 0 0 -4px;
      }

      .subtitle {
        color: #333333;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 8px;
        margin: 0 0 24px;
      }

      .recipient-label {
        font-size: 18px;
        color: #333333;
        margin: 0 0 12px;
        font-weight: 500;
      }

      .recipient-name {
        font-size: 29px;
        font-weight: 700;
        color: #222222;
        padding-bottom: 10px;
        border-bottom: 2px solid #e5e7eb;
        min-width: 500px;
        text-align: center;
        margin-bottom: 20px;
      }

      .description {
        font-size: 17px;
        color: #333333;
        text-align: center;
        line-height: 1.5;
        max-width: 700px;
        font-weight: 500;
      }

      /* Medali (Bawah Tengah) */
      .medal-container {
        margin-top: 14px;
      }

      .medal-container svg {
        width: 72px;
        height: 86px;
      }
    </style>
  </head>
  <body>
    <!-- KANVAS SERTIFIKAT UTAMA -->
    <div id="printable-certificate">
      <!-- LAYER BACKGROUND STABIL UNTUK TAMPILAN DAN PDF -->
      <div class="ai-grid"></div>
      <div class="top-band"></div>
      <div class="bottom-band"></div>
      <div class="side-panel left"></div>
      <div class="side-panel right"></div>
      <div class="certificate-frame"></div>
      <div class="ai-accent top-right"></div>
      <div class="ai-accent bottom-left"></div>
      <div class="ai-node node-one"></div>
      <div class="ai-node node-two"></div>

      <!-- LOGO KIRI (Pemprov Kalsel) -->
      <div
        class="absolute top-[50px] left-[50px] h-[85px] z-20 flex items-center"
      >
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Coat_of_arms_of_South_Kalimantan.svg/960px-Coat_of_arms_of_South_Kalimantan.svg.png"
          alt="Logo Pemprov Kalsel"
          class="h-full w-auto object-contain drop-shadow-md"
          crossorigin="anonymous"
        />
      </div>

      <!-- LAYER KONTEN TEKS -->
      <div class="content-layer">
        <div class="ethics-label">Kuis Pemahaman Etika AI</div>
        <h1 class="title">SERTIFIKAT</h1>
        <h2 class="subtitle">KELULUSAN</h2>

        <p class="recipient-label">Dengan bangga dipersembahkan kepada:</p>

        <!-- Tempat Nama & Sekolah disuntikkan dari Storyline -->
        <div id="participant-info" class="recipient-name">
          Memuat Data Peserta...
        </div>

        <div class="description">
          Telah berhasil menyelesaikan kuis pemahaman tentang<br />
          <strong>Etika Kecerdasan Artifisial (AI)</strong>, meliputi penggunaan
          teknologi yang bertanggung jawab, adil, aman, dan berintegritas.
        </div>

        <!-- MEDALI EMAS VEKTOR (Anti-Pecah saat dicetak) -->
        <div class="medal-container">
          <svg
            width="100"
            height="120"
            viewBox="0 0 100 120"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- Pita Biru Kiri -->
            <path d="M30 70L15 110L35 100L50 115L45 70" fill="#0E5C70" />
            <!-- Pita Biru Kanan -->
            <path d="M70 70L85 110L65 100L50 115L55 70" fill="#19829A" />
            <!-- Lingkaran Medali Luar (Gerigi) -->
            <circle cx="50" cy="50" r="35" fill="#ECA72C" />
            <path
              d="M50 10 L55 15 L62 12 L65 18 L73 18 L73 26 L80 28 L78 35 L85 38 L80 45 L85 50 L80 55 L85 62 L78 65 L80 72 L73 74 L73 82 L65 82 L62 88 L55 85 L50 90 L45 85 L38 88 L35 82 L27 82 L27 74 L20 72 L22 65 L15 62 L20 55 L15 50 L20 45 L15 38 L22 35 L20 28 L27 26 L27 18 L35 18 L38 12 L45 15 Z"
              fill="#F4B41A"
            />
            <!-- Lingkaran Dalam Emas -->
            <circle
              cx="50"
              cy="50"
              r="28"
              fill="#F9A826"
              stroke="#FFFFFF"
              stroke-width="2"
            />
            <!-- Lingkaran Dalam Terang -->
            <circle cx="50" cy="50" r="22" fill="#FBBF24" />
            <!-- Bintang Kecil -->
            <path
              d="M50 35L52 40H57L53 43L55 48L50 45L45 48L47 43L43 40H48L50 35Z"
              fill="#FFFFFF"
            />
            <path
              d="M35 48L36 51H39L37 53L38 56L35 54L32 56L33 53L31 51H34L35 48Z"
              fill="#FFFFFF"
            />
            <path
              d="M65 48L66 51H69L67 53L68 56L65 54L62 56L63 53L61 51H64L65 48Z"
              fill="#FFFFFF"
            />
          </svg>
        </div>
      </div>
    </div>

    <script>
      // FUNGSI 1: MENGAMBIL DATA DARI ARTICULATE STORYLINE SAAT WEB OBJECT DIMUAT
      window.onload = function () {
        let name = "Nama Peserta";
        let school = "Asal Sekolah";

        try {
          // Melacak Engine Storyline dari dalam Web Object (Iframe)
          let player = parent.GetPlayer() || window.top.GetPlayer();
          if (player) {
            name = player.GetVar("playerName") || "Nama Peserta";
            school = player.GetVar("playerSchool") || "Asal Sekolah";
          }
        } catch (e) {
          console.log("Menjalankan di luar Storyline atau terhalang CORS.");
        }

        // Menyuntikkan data ke dalam sertifikat HTML
        document.getElementById("participant-info").innerText =
          name + " dari " + school;
      };

      // FUNGSI 2: FITUR CETAK OTOMATIS (Bisa dipanggil dari tombol Cetak di Storyline)
      window.downloadPDF = function () {
        var element = document.getElementById("printable-certificate");
        var rawText = document.getElementById("participant-info").innerText;
        var cleanName = rawText
          .split(" dari ")[0]
          .replace(/[^a-zA-Z0-9]/g, "_");

        var opt = {
          margin: 0,
          filename: "Sertifikat_Quiz_" + cleanName + ".pdf",
          image: { type: "jpeg", quality: 1.0 },
          html2canvas: { scale: 2, useCORS: true, backgroundColor: "#ffffff" },
          jsPDF: { unit: "px", format: [900, 600], orientation: "landscape" },
        };

        document.body.classList.add("pdf-export");
        return html2pdf()
          .set(opt)
          .from(element)
          .save()
          .then(
            function () {
              document.body.classList.remove("pdf-export");
            },
            function (error) {
              document.body.classList.remove("pdf-export");
              throw error;
            },
          );
      };
    </script>
  </body>
</html>
